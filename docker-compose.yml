# 多角色文章管理系统 - Docker Compose 一键部署
# 使用方式：docker-compose up -d

version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: article_admin
      POSTGRES_PASSWORD: article_password_2026
      POSTGRES_DB: article_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U article_admin -d article_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端 API 服务
  backend:
    build: ./article-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://article_admin:article_password_2026@db:5432/article_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-strong-random-string-at-least-32-chars}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  # 前端服务
  frontend:
    build:
      context: ./article-frontend
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
